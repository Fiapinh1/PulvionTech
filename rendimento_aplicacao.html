<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rendimento de Aplicação · Top Gun</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME TOKENS
============================================================ */
:root, [data-theme="light"] {
  --gold:         #b8942e;
  --gold-light:   #d9b24c;
  --gold-dim:     rgba(184,148,46,0.10);
  --gold-border:  rgba(184,148,46,0.28);

  --bg:           #f0ede6;
  --card:         #ffffff;
  --surface:      #f5f2eb;
  --surface-2:    #ebe7dd;
  --input-bg:     #f8f6f1;
  --input-ro:     #ede9e0;

  --header-bg:    rgba(240,237,230,0.97);
  --header-bdr:   rgba(184,148,46,0.22);

  --text:         #0d1117;
  --text-muted:   #4b5563;
  --text-label:   #94a3b8;

  --success:      #16a34a;
  --success-dim:  rgba(22,163,74,0.10);
  --success-bdr:  rgba(22,163,74,0.28);
  --warning:      #d97706;
  --warning-dim:  rgba(217,119,6,0.10);
  --warning-bdr:  rgba(217,119,6,0.32);
  --danger:       #dc2626;
  --danger-dim:   rgba(220,38,38,0.08);
  --danger-bdr:   rgba(220,38,38,0.28);

  --shadow-sm:    0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:    0 4px 20px rgba(0,0,0,0.07);
  --radius:       12px;
  --radius-sm:    8px;
}

[data-theme="dark"] {
  --gold:         #d9b24c;
  --gold-light:   #f0d078;
  --gold-dim:     rgba(217,178,76,0.10);
  --gold-border:  rgba(217,178,76,0.28);

  --bg:           #060912;
  --card:         #0c1224;
  --surface:      #0f1628;
  --surface-2:    rgba(255,255,255,0.04);
  --input-bg:     #0b1425;
  --input-ro:     #0f182c;

  --header-bg:    rgba(10,15,31,0.97);
  --header-bdr:   rgba(217,178,76,0.22);

  --text:         #f0ece4;
  --text-muted:   #9ca3af;
  --text-label:   #6b7280;

  --success:      #22c55e;
  --success-dim:  rgba(34,197,94,0.10);
  --success-bdr:  rgba(34,197,94,0.28);
  --warning:      #f59e0b;
  --warning-dim:  rgba(245,158,11,0.12);
  --warning-bdr:  rgba(245,158,11,0.35);
  --danger:       #ef4444;
  --danger-dim:   rgba(239,68,68,0.10);
  --danger-bdr:   rgba(239,68,68,0.30);

  --shadow-sm:    0 2px 8px rgba(0,0,0,0.20);
  --shadow-md:    0 8px 28px rgba(0,0,0,0.30);
  --radius:       12px;
  --radius-sm:    8px;
}

/* ============================================================
   BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Barlow', sans-serif; font-size: 15px; line-height: 1.6;
  color: var(--text); background: var(--bg);
  min-height: 100vh; padding-bottom: 40px;
  transition: background 0.3s, color 0.3s;
}
[data-theme="light"] body {
  background-image: radial-gradient(ellipse 70% 40% at 5% 0%, rgba(184,148,46,0.06) 0%, transparent 55%);
}
h1,h2,h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--gold-border); border-radius:4px; }

/* ============================================================
   HEADER
============================================================ */
.site-header {
  position:sticky; top:0; z-index:50;
  background:var(--header-bg); border-bottom:1px solid var(--header-bdr);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  box-shadow:var(--shadow-sm); transition:background 0.3s,border-color 0.3s;
}
.header-inner {
  display:flex; align-items:center; gap:12px;
  padding:0 16px; height:60px; max-width:1400px; margin:0 auto;
}
.header-title {
  flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:'Barlow Condensed',sans-serif; font-size:1.05rem; font-weight:800;
  letter-spacing:0.04em; text-transform:uppercase; color:var(--gold);
}

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:0.95rem; letter-spacing:0.06em; text-transform:uppercase;
  text-decoration:none; border-radius:var(--radius-sm); padding:10px 16px;
  border:1px solid var(--gold-border); background:var(--gold-dim); color:var(--gold);
  transition:all 0.2s ease; -webkit-tap-highlight-color:transparent; white-space:nowrap;
}
.btn:hover { background:rgba(184,148,46,0.18); border-color:var(--gold); }

.btn-primary { background:var(--gold); border-color:var(--gold); color:#fff; box-shadow:0 4px 14px rgba(184,148,46,0.25); }
[data-theme="dark"] .btn-primary { color:#0b0f1f; }
.btn-primary:hover { background:var(--gold-light); border-color:var(--gold-light); }

.btn-ghost { background:var(--surface); border-color:rgba(0,0,0,0.08); color:var(--text-muted); }
[data-theme="dark"] .btn-ghost { border-color:rgba(255,255,255,0.08); }
.btn-ghost:hover { background:var(--surface-2); color:var(--text); border-color:var(--gold-border); }

.btn-success-soft { background:var(--success-dim); border-color:var(--success-bdr); color:var(--success); }
.btn-success-soft:hover { background:rgba(22,163,74,0.16); }

.btn-danger-soft { background:var(--danger-dim); border-color:var(--danger-bdr); color:var(--danger); }
.btn-danger-soft:hover { background:rgba(220,38,38,0.14); }

.btn-warning-soft { background:var(--warning-dim); border-color:var(--warning-bdr); color:var(--warning); }

.btn-sm  { padding:7px 12px; font-size:0.82rem; }
.btn-xs  { padding:5px 9px;  font-size:0.75rem; }

.theme-toggle {
  display:inline-flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:var(--radius-sm);
  border:1px solid var(--gold-border); background:var(--gold-dim);
  color:var(--gold); cursor:pointer; transition:all 0.2s; flex-shrink:0;
}
.theme-toggle:hover { background:rgba(184,148,46,0.2); border-color:var(--gold); transform:rotate(20deg); }

/* ============================================================
   PAGE LAYOUT
============================================================ */
.page-wrap {
  max-width:1400px; margin:0 auto; padding:18px 16px;
  display:grid; grid-template-columns:1fr 380px; gap:14px; align-items:start;
}
@media (max-width:1024px) { .page-wrap { grid-template-columns:1fr; } }

/* ============================================================
   CARDS
============================================================ */
.card {
  background:var(--card); border:1px solid var(--gold-border);
  border-radius:var(--radius); box-shadow:var(--shadow-md);
  overflow:hidden; transition:background 0.3s,border-color 0.3s;
}
.card-header {
  display:flex; align-items:center; gap:10px; padding:13px 18px;
  border-bottom:1px solid var(--gold-border); background:var(--gold-dim);
}
.card-header-icon {
  width:30px; height:30px; border-radius:7px; border:1px solid var(--gold-border);
  background:var(--card); display:flex; align-items:center; justify-content:center;
  color:var(--gold); flex-shrink:0;
}
.card-title {
  font-family:'Barlow Condensed',sans-serif; font-size:0.92rem; font-weight:800;
  letter-spacing:0.06em; text-transform:uppercase; color:var(--text); flex:1;
}
.card-badge {
  font-family:'IBM Plex Mono',monospace; font-size:0.6rem; letter-spacing:0.12em;
  color:var(--text-label); padding:3px 8px; border-radius:999px;
  border:1px solid var(--gold-border); background:var(--card);
}
.card-body { padding:18px; }

/* ============================================================
   FORM FIELDS
============================================================ */
.field-group { display:flex; flex-direction:column; gap:12px; }
.fields-2col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.fields-3col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

.field { display:flex; flex-direction:column; gap:5px; }
.field label {
  font-family:'IBM Plex Mono',monospace; font-size:0.65rem; font-weight:500;
  letter-spacing:0.12em; text-transform:uppercase; color:var(--text-label);
}

input, select, textarea {
  width:100%; background:var(--input-bg); color:var(--text);
  border:1px solid var(--gold-border); border-radius:var(--radius-sm);
  padding:10px 13px; font-family:'Barlow',sans-serif; font-size:0.93rem;
  outline:none; transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none; -webkit-tap-highlight-color:transparent;
}
input:focus, select:focus, textarea:focus {
  border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim);
}
input[readonly], input[readonly]:focus,
textarea[readonly], textarea[readonly]:focus {
  background:var(--input-ro); color:var(--text-muted);
  border-color:rgba(0,0,0,0.06); box-shadow:none; cursor:default;
}
[data-theme="dark"] input[readonly],
[data-theme="dark"] textarea[readonly] { border-color:rgba(255,255,255,0.05); }
select { cursor:pointer; }
textarea { resize:vertical; min-height:64px; }

/* section label inside cards */
.section-label {
  font-family:'Barlow Condensed',sans-serif; font-size:0.78rem; font-weight:800;
  letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted);
  display:flex; align-items:center; gap:6px; padding:10px 0 2px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--gold-border); }

/* ============================================================
   FARM CARDS
============================================================ */
.farm-list { display:flex; flex-direction:column; gap:12px; }

.farm-card {
  border:1px solid var(--gold-border); border-radius:var(--radius-sm);
  background:var(--surface); overflow:hidden; transition:border-color 0.2s;
}
.farm-card:hover { border-color:var(--gold); }

.farm-card-header {
  display:flex; align-items:center; gap:8px; padding:9px 14px;
  background:var(--gold-dim); border-bottom:1px solid var(--gold-border);
}
.farm-card-num {
  font-family:'IBM Plex Mono',monospace; font-size:0.6rem; font-weight:500;
  letter-spacing:0.1em; color:var(--text-label);
}
.farm-card-title {
  font-family:'Barlow Condensed',sans-serif; font-size:0.82rem; font-weight:700;
  letter-spacing:0.05em; text-transform:uppercase; color:var(--text-muted); flex:1;
}
.farm-card-body { padding:14px; display:flex; flex-direction:column; gap:10px; }

/* OS search */
.os-search-row { display:flex; gap:8px; align-items:flex-end; }
.os-search-row .field { flex:1; }
.os-search-row input { font-family:'IBM Plex Mono',monospace !important; font-weight:500 !important; }

.farm-lookup-msg {
  font-family:'IBM Plex Mono',monospace; font-size:0.66rem; letter-spacing:0.04em;
  min-height:16px; color:var(--text-label);
}
.farm-lookup-msg.ok   { color:var(--success); }
.farm-lookup-msg.err  { color:var(--danger); }
.farm-lookup-msg.load { color:var(--gold); }

/* Manual mode banner */
.manual-banner {
  display:none; align-items:center; gap:8px; flex-wrap:wrap;
  padding:8px 12px; border-radius:var(--radius-sm);
  background:var(--warning-dim); border:1px solid var(--warning-bdr);
}
.manual-banner.show { display:flex; }
.manual-banner-txt {
  font-family:'IBM Plex Mono',monospace; font-size:0.66rem;
  color:var(--warning); letter-spacing:0.04em; flex:1;
}

/* info cells */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.info-cell { background:var(--card); border:1px solid var(--gold-border); border-radius:7px; padding:8px 10px; }
.info-cell.full { grid-column:1/-1; }
.i-label { font-family:'IBM Plex Mono',monospace; font-size:0.57rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-label); margin-bottom:3px; }
.i-val { font-size:0.88rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.i-val.gold { font-family:'IBM Plex Mono',monospace; color:var(--gold); }
.i-val-area { font-size:0.88rem; color:var(--text); line-height:1.5; word-break:break-word; white-space:pre-wrap; }

/* info cell editable mode */
.info-cell.editable { border-color:var(--warning-bdr); background:var(--warning-dim); }
.info-cell.editable .i-val-edit { display:block; }
.info-cell.editable .i-val-static { display:none; }
.i-val-edit { display:none; }
.i-val-static {}

/* ============================================================
   STATUS PILLS (per farm)
============================================================ */
.status-pills { display:flex; gap:8px; flex-wrap:wrap; }
.st-pill { position:relative; cursor:pointer; }
.st-pill input[type="radio"] { position:absolute; opacity:0; width:0; height:0; }
.st-pill-label {
  display:inline-flex; align-items:center; gap:5px;
  padding:7px 16px; border-radius:999px;
  border:1px solid var(--gold-border); background:var(--surface);
  font-family:'Barlow Condensed',sans-serif; font-size:0.82rem; font-weight:700;
  letter-spacing:0.04em; text-transform:uppercase;
  color:var(--text-muted); cursor:pointer; transition:all 0.2s; user-select:none;
}
.st-pill-label:hover { background:var(--gold-dim); color:var(--gold); }
.st-pill.s-andamento input:checked ~ .st-pill-label {
  background:var(--warning-dim); border-color:var(--warning-bdr); color:var(--warning);
  box-shadow:0 0 0 2px rgba(217,119,6,0.08);
}
.st-pill.s-finalizado input:checked ~ .st-pill-label {
  background:var(--success-dim); border-color:var(--success-bdr); color:var(--success);
  box-shadow:0 0 0 2px rgba(22,163,74,0.08);
}

/* ============================================================
   SOBROU PRODUTO
============================================================ */
.sobrou-row { display:flex; gap:8px; align-items:flex-end; }
.sobrou-row .field:first-child { flex:0 0 auto; }
.sobrou-row .field:last-child { flex:1; }
.sobrou-qty-wrap { display:none; }
.sobrou-qty-wrap.show { display:flex; flex-direction:column; gap:5px; }

/* ============================================================
   TALHÕES
============================================================ */
.talhoes-section { display:flex; flex-direction:column; gap:8px; }

.talhao-row {
  display:flex; align-items:flex-end; gap:8px;
  padding:10px 12px; border-radius:var(--radius-sm);
  background:var(--card); border:1px solid var(--gold-border);
}
.talhao-row .field { flex:1; }
.talhao-row .field:first-child { flex:0 0 140px; }

/* ============================================================
   TOTALS BAR
============================================================ */
.totals-row {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  padding:12px 18px; border-top:1px solid var(--gold-border); background:var(--gold-dim);
}
.total-chip {
  display:inline-flex; align-items:center; gap:6px; padding:5px 12px;
  border-radius:999px; border:1px solid var(--gold-border); background:var(--card);
  font-family:'IBM Plex Mono',monospace; font-size:0.68rem; font-weight:500;
  letter-spacing:0.06em; color:var(--gold);
}

/* ============================================================
   PREVIEW STICKY
============================================================ */
.preview-sticky { position:sticky; top:74px; }
.preview-box {
  white-space:pre-wrap; background:var(--input-bg); border:1px solid var(--gold-border);
  border-radius:var(--radius-sm); padding:16px; min-height:300px;
  max-height:calc(100vh - 280px); font-family:'IBM Plex Mono',monospace;
  font-size:0.78rem; line-height:1.75; overflow:auto; color:var(--text);
}
.action-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.action-grid .span2 { grid-column:1/-1; }
.divider { height:1px; background:var(--gold-border); margin:4px 0; }
.status-badge {
  display:none; align-items:center; justify-content:center; gap:6px;
  padding:5px 14px; border-radius:999px; font-family:'IBM Plex Mono',monospace;
  font-size:0.65rem; font-weight:500; letter-spacing:0.08em;
  border:1px solid var(--gold-border); background:var(--gold-dim); color:var(--text-label);
}
.status-badge.ok   { display:inline-flex; color:var(--success); border-color:var(--success-bdr); background:var(--success-dim); }
.status-badge.warn { display:inline-flex; color:var(--danger);  border-color:var(--danger-bdr);  background:var(--danger-dim); }

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width:640px) {
  .fields-3col { grid-template-columns:1fr 1fr; }
  .fields-2col { grid-template-columns:1fr; }
  .info-grid   { grid-template-columns:1fr; }
  .action-grid { grid-template-columns:1fr; }
  .action-grid .span2 { grid-column:1; }
  .talhao-row  { flex-wrap:wrap; }
  .talhao-row .field:first-child { flex:0 0 120px; }
  .sobrou-row  { flex-direction:column; align-items:stretch; }
}
@media (max-width:400px) { .fields-3col { grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="btn btn-sm" href="./" title="Voltar">
      <i data-lucide="arrow-left" width="14" height="14"></i>
      Voltar
    </a>
    <div class="header-title">
      <i data-lucide="bar-chart-3" width="16" height="16"></i>
      Rendimento de Aplicação
    </div>
    <button class="theme-toggle" id="themeToggle" title="Alternar tema">
      <i data-lucide="moon" width="15" height="15" id="themeIcon"></i>
    </button>
  </div>
</header>

<!-- PAGE -->
<div class="page-wrap">

  <!-- ── LEFT COLUMN ─────────────────────────────────────── -->
  <div style="display:flex;flex-direction:column;gap:14px;">

    <!-- Dados Gerais -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon"><i data-lucide="sliders-horizontal" width="15" height="15"></i></div>
        <span class="card-title">Dados Gerais</span>
        <span class="card-badge">Etapa 1</span>
      </div>
      <div class="card-body">
        <div class="field-group">

          <div class="fields-3col">
            <div class="field">
              <label>Data de Aplicação</label>
              <input type="date" id="dataAplicacao">
            </div>
            <div class="field">
              <label>Estado</label>
              <select id="estado">
                <option value="">Selecione…</option>
                <option value="MG">Minas Gerais (MG)</option>
                <option value="SP">São Paulo (SP)</option>
              </select>
            </div>
            <div class="field">
              <label>Unidade</label>
              <select id="unidade" disabled>
                <option value="">Selecione o Estado</option>
              </select>
            </div>
          </div>

          <div class="fields-3col">
            <div class="field">
              <label>Frente</label>
              <select id="frente">
                <option value="">Selecione…</option>
                <option>Frente 1</option><option>Frente 2</option><option>Frente 3</option>
                <option>Frente 4</option><option>Frente 5</option><option>Frente 6</option>
                <option>Frente 7</option>
              </select>
            </div>
            <div class="field">
              <label>Piloto</label>
              <input id="piloto" placeholder="Auto" readonly>
            </div>
            <div class="field">
              <label>Auxiliar</label>
              <select id="auxiliar">
                <option value="">Selecione…</option>
                <option>Thiago Rodrigues</option>
                <option>Pedro Henrique</option>
                <option>José Filho</option>
                <option>Luiz Gustavo</option>
                <option>Hilton Silva</option>
                <option>Luis Miguel</option>
              </select>
            </div>
          </div>

          <div class="fields-3col">
            <div class="field">
              <label>Drone</label>
              <select id="drone">
                <option value="">Selecione…</option>
                <option>DJI AGRAS T20</option>
                <option>DJI AGRAS T40</option>
                <option>DJI AGRAS T70</option>
              </select>
            </div>
            <div class="field">
              <label>Objetivo</label>
              <select id="objetivo">
                <option value="">Selecione…</option>
                <option>Área Total</option><option>Catação</option>
              </select>
            </div>
            <div class="field">
              <label>Tipo de Produto</label>
              <select id="tipoProduto">
                <option value="">Selecione…</option>
                <option>Herbicida</option><option>Inseticida</option>
                <option>Fungicida</option><option>Fertilizante</option>
              </select>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Fazendas -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-icon"><i data-lucide="tractor" width="15" height="15"></i></div>
        <span class="card-title">Fazendas por OS</span>
        <span class="card-badge">Etapa 2</span>
      </div>

      <div class="card-body" style="padding-bottom:0;">
        <div class="farm-list" id="fazendasContainer"></div>

        <div style="padding:14px 0 4px;display:flex;align-items:center;gap:10px;">
          <button class="btn btn-sm" id="btnAddFazenda">
            <i data-lucide="plus" width="13" height="13"></i>
            Adicionar fazenda
          </button>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:0.63rem;color:var(--text-label);">
            OS não encontrada? campos liberados para manual
          </span>
        </div>
      </div>

      <div class="totals-row">
        <span class="total-chip">

/* ============================================================
   JSONP
============================================================ */
function jsonp(urlString){
  const url=new URL(urlString);
  const cb='__jsonp_'+Math.random().toString(36).slice(2);
  url.searchParams.set('callback',cb);
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=url.toString();
    window[cb]=(data)=>{ resolve(data); cleanup(); };
    s.onerror=()=>{ reject(new Error('Falha no JSONP')); cleanup(); };
    function cleanup(){ delete window[cb]; s.remove(); }
    document.body.appendChild(s);
  });
}

/* ============================================================
   MANUAL MODE
============================================================ */
function setManualMode(idx, enabled){
  const cells = ['cod','faz','area','op'];
  const fieldIds = ['codigo','fazenda','area','operacao'];

  cells.forEach((k,i)=>{
    const cell   = document.getElementById(`cell_${k}_${idx}`);
    const stat   = document.getElementById(`d${k.charAt(0).toUpperCase()+k.slice(1)}_${idx}`) ||
                   document.getElementById(`dArea_${idx}`) || null;
    const editEl = document.getElementById(`${fieldIds[i]}_${idx}`);
    if(cell) cell.classList.toggle('editable', enabled);
    if(stat) stat.style.display = enabled ? 'none' : '';
    if(editEl){ editEl.style.display = enabled ? '' : 'none'; if(!enabled) editEl.removeAttribute('disabled'); }
  });

  // insumos
  const cellIns  = document.getElementById(`cell_ins_${idx}`);
  const dIns     = document.getElementById(`dIns_${idx}`);
  const insInput = document.getElementById(`insumos_${idx}`);
  if(cellIns) cellIns.classList.toggle('editable', enabled);
  if(dIns)   dIns.style.display    = enabled ? 'none' : '';
  if(insInput){ insInput.style.display = enabled ? '' : 'none'; }

  const banner = document.getElementById(`manual_${idx}`);
  if(banner) banner.classList.toggle('show', enabled);
}

/* ============================================================
   CLEAR / SET DISPLAY
============================================================ */
function clearFarmDisplay(idx){
  [['dCod','—'],['dFaz','—'],['dArea','—'],['dOp','—'],['dIns','—']].forEach(([id,v])=>{
    const el = document.getElementById(`${id}_${idx}`); if(el) el.textContent=v;
  });
  ['codigo','fazenda','area','operacao','insumos'].forEach(k=>{
    const el = document.getElementById(`${k}_${idx}`); if(el) el.value='';
  });
  setFarmMsg(idx,'');
  setManualMode(idx, false);
}

function setFarmDisplay(idx, cod, faz, area, op, ins){
  const sd = (id,val)=>{ const e=document.getElementById(id); if(e) e.textContent=val||'—'; };
  const sv = (id,val)=>{ const e=document.getElementById(id); if(e) e.value=val||''; };

  sd(`dCod_${idx}`, cod);
  sd(`dFaz_${idx}`, faz);
  sd(`dArea_${idx}`, area ? area+' ha' : '—');
  sd(`dOp_${idx}`,  op);
  sd(`dIns_${idx}`, ins);

  sv(`codigo_${idx}`,   cod);
  sv(`fazenda_${idx}`,  faz);
  sv(`area_${idx}`,     area);
  sv(`operacao_${idx}`, op);
  sv(`insumos_${idx}`,  ins);
}

function setFarmMsg(idx, msg, type=''){
  const el = document.getElementById(`lmsg_${idx}`);
  if(!el) return;
  el.textContent = msg;
  el.className   = 'farm-lookup-msg'+(type?' '+type:'');
}

/* ============================================================
   OS LOOKUP
============================================================ */
async function buscarOS(idx){
  const osInput = document.getElementById(`os_${idx}`);
  const osVal   = (osInput?.value||'').trim();
  if(!osVal){ clearFarmDisplay(idx); updateResumo(); return; }

  setFarmMsg(idx,'Buscando…','load');

  try{
    const js = await jsonp(APPS_SCRIPT_URL+'?os='+encodeURIComponent(osVal));

    if(!js.ok || !js.rows || !js.rows.length){
      clearFarmDisplay(idx);
      setManualMode(idx, true);
      setFarmMsg(idx,'OS não encontrada. Preencha manualmente.','err');
      updateResumo(); return;
    }

    const row = js.rows.find(x=>String(x.OS)===String(osVal)) || js.rows[0];
    const get = k=>(row[k]??row[k?.toUpperCase()]??'').toString().trim();

    const area = (get('AREA (HA)')||'').replace(',','.');
    setFarmDisplay(idx, get('CODIGO'), get('FAZENDA'), area, get('OPERACAO'), get('INSUMOS'));
    setManualMode(idx, false);

    // sync objetivo
    const objSel = document.getElementById('objetivo');
    const objStr = get('OBJETIVO');
    if(objStr) [...objSel.options].forEach(o=>{ if(o.value.toUpperCase()===objStr.toUpperCase()) objSel.value=o.value; });

    setFarmMsg(idx,'✓ OS carregada com sucesso','ok');
    updateResumo(); gerarTexto();

  }catch(e){
    console.error(e);
    setManualMode(idx, true);
    setFarmMsg(idx,'Falha ao buscar OS — modo manual ativado.','err');
    updateResumo();
  }
}

/* ============================================================
   RESUMO BADGES
============================================================ */
function updateResumo(){
  const cards = [...fazendasContainer.querySelectorAll('.farm-card')];
  let totalFaz=0, totalArea=0;
  cards.forEach(c=>{
    // check display value or hidden input
    const fazEl  = c.querySelector('[id^="fazenda_"]');
    const areaEl = c.querySelector('[id^="area_"]');
    const faz  = (fazEl?.value||'').trim() || (c.querySelector('[id^="dFaz_"]')?.textContent||'').replace('—','').trim();
    const aStr = (areaEl?.value||'').trim();
    if(faz) totalFaz++;
    const v = parseFloat(aStr.replace(',','.'));
    if(!isNaN(v)) totalArea+=v;
  });
  document.getElementById('badgeFaz').textContent  = `Fazendas: ${totalFaz}`;
  document.getElementById('badgeArea').textContent = `Área OS: ${totalArea.toFixed(2).replace('.',',')} ha`;
}

   STATUS HELPER
============================================================ */
function getFarmStatus(idx){
  const el = document.getElementById(`stpills_${idx}`);
  if(!el) return '';
  const ch = el.querySelector('input[type="radio"]:checked');
  return ch ? ch.value : '';
}

/* ============================================================
   GERAR TEXTO
============================================================ */
function gerarTexto(){
  const data       = (document.getElementById('dataAplicacao').value||'').split('-').reverse().join('/');
  const unidade    = document.getElementById('unidade').value     || '-';
  const frente     = document.getElementById('frente').value      || '-';
  const piloto     = document.getElementById('piloto').value      || '-';
  const auxiliar   = document.getElementById('auxiliar').value    || '-';
  const drone      = document.getElementById('drone').value       || '-';
  const objetivo   = document.getElementById('objetivo').value    || '-';
  const tipoProd   = document.getElementById('tipoProduto').value || '-';

  const cards = [...fazendasContainer.querySelectorAll('.farm-card')];
  let blocos=[], totalFaz=0, totalAreaProg=0, totalAreaApl=0;

  cards.forEach(c=>{
    const idx      = c.dataset.idx;
    const os       = (c.querySelector('[id^="os_"]')?.value       ||'').trim();
    const codigo   = (c.querySelector('[id^="codigo_"]')?.value   ||'').trim();
    const fazenda  = (c.querySelector('[id^="fazenda_"]')?.value  ||'').trim();
    const aStr     = (c.querySelector('[id^="area_"]')?.value     ||'').trim();
    const operacao = (c.querySelector('[id^="operacao_"]')?.value ||'').trim();
    const insumos  = (c.querySelector('[id^="insumos_"]')?.value  ||'').trim();
    const motivo   = (c.querySelector(`#motivo_${idx}`)?.value    ||'').trim();
    const motivoOutro = (c.querySelector(`#motivo_outro_${idx}`)?.value||'').trim();
    const status   = getFarmStatus(idx);
    const sobrou   = (c.querySelector('[id^="sobrou_"]')?.value   ||'').trim();
    const sobrouQtd= (c.querySelector('[id^="sobrou_qtd_"]')?.value||'').trim();

    if(fazenda) totalFaz++;
    const vProg = parseFloat(aStr.replace(',','.'));
    if(!isNaN(vProg)) totalAreaProg+=vProg;

    // talhões
    const talhWrap = c.querySelector('.talhoes-section');
    let talhoesTxt=[], somaApl=0;
    if(talhWrap){
      [...talhWrap.querySelectorAll('.talhao-row')].forEach(r=>{
        const t = r.querySelector('[id^="talhao_"]')?.value.trim();
        const q = r.querySelector('[id^="qtd_"]')?.value.trim();
        if(t||q){
          const qNum = parseFloat((q||'').replace(',','.'));
          if(!isNaN(qNum)) somaApl+=qNum;
          talhoesTxt.push(`- Talhão ${t||'-'}: ${q?q+' ha':'-'}`);
        }
      });
    }
    totalAreaApl += somaApl;

    const areaClean = aStr.replace(/\s*ha$/i,'').trim();
    const areaFmt   = areaClean ? areaClean+' ha' : '-';

    let statusIcon = status==='Finalizado'?'✅':status==='Em andamento'?'🟡':'';
    const motivoTxt = motivo ? (motivo==='Outro'?(motivoOutro||'Outro'):motivo) : '-';

    let sobrouFmt = 'Não';
    if(sobrou==='Sim'){
      if(sobrouQtd){
        let sq = sobrouQtd.trim();
        if(!/litro|litros|\bL\b|l$/i.test(sq)) sq = sq+' Litros';
        sobrouFmt = sq;
      } else { sobrouFmt = '-'; }
    }

    blocos.push(
`*📋 OS:* ${os||'-'}
*Código:* ${codigo||'-'}
*Fazenda:* ${fazenda||'-'}
*Área (ha):* ${areaFmt}
*Operação:* ${operacao||'-'}
*Insumos:* ${insumos||'-'}
*Status:* ${statusIcon?statusIcon+' ':''}${status||'-'}

*Motivo Observação:* ${motivoTxt}

*Talhões:*
${talhoesTxt.length?talhoesTxt.join('\n'):'-'}
*Subtotal aplicado (ha):* ${somaApl?somaApl.toFixed(2).replace('.',',')+' ha':'0,00 ha'}
*Sobrou produto:* ${sobrouFmt}`
    );
  });

  const header =
`📅 *Rendimento Aplicação* ✅ ${data||'-'}

*Unidade:* ${unidade}
*Frente:* ${frente}
*Piloto:* ${piloto}
*Auxiliar:* ${auxiliar}
*Drone:* ${drone}
*Objetivo:* ${objetivo}
*Tipo de Produto:* ${tipoProd}`;

  const resumo =
`\n*Resumo Geral:*
*Qtd. Fazendas:* ${totalFaz}
*Área O.S:* ${totalAreaProg.toFixed(2).replace('.',',')} ha
*Área aplicada:* ${totalAreaApl.toFixed(2).replace('.',',')} ha`;

  const sep = '_______';
  const blocosTexto = blocos.length ? blocos.map(b=>b+'\n'+sep).join('\n\n') : '';

  const textoFinal = header+(blocosTexto?'\n\n'+blocosTexto+'\n\n':'\n\n')+resumo;
  document.getElementById('preview').textContent = textoFinal;
  document.getElementById('btnWhats').href = 'https://wa.me/?text='+encodeURIComponent(textoFinal);
  updateResumo();
}

/* ============================================================
   STATUS BADGE
============================================================ */
function showStatus(msg, type){
  const badge = document.getElementById('lblInfo');
  badge.textContent = msg; badge.className = 'status-badge '+type;
  setTimeout(()=>{ badge.className='status-badge'; }, 2200);
}

/* ============================================================
   INIT
============================================================ */
document.addEventListener('DOMContentLoaded', ()=>{
  refreshIcons();

  const today = new Date(); const pad=n=>String(n).padStart(2,'0');
  document.getElementById('dataAplicacao').value =
    `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  addFazenda();

  document.getElementById('btnAddFazenda').addEventListener('click', ()=>addFazenda());

  document.getElementById('btnGerar').addEventListener('click', ()=>{
    gerarTexto(); showStatus('✓ Prévia atualizada','ok');
  });

  document.getElementById('btnCopiar').addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(document.getElementById('preview').textContent||'');
      showStatus('✓ Copiado!','ok');
    }catch(_){ showStatus('Falha ao copiar','warn'); }
  });

  gerarTexto();
});
</script>
