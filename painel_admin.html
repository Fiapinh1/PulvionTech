<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador · Pulvion Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.281.0/dist/umd/lucide.min.js"></script>

    <style>
        /* ============================================================
           THEME TOKENS
        ============================================================ */
        :root, [data-theme="light"] {
            --gold:          #b8942e;
            --gold-light:    #d9b24c;
            --gold-dim:      rgba(184,148,46,0.10);
            --gold-border:   rgba(184,148,46,0.26);

            --bg-base:       #f0ede6;
            --bg-card:       #ffffff;
            --bg-card-hov:   #faf8f4;
            --surface:       #f5f2eb;
            --surface-2:     #ebe7dd;
            --surface-3:     #e4dfcf;

            --sidebar-bg:    #ffffff;
            --sidebar-bdr:   rgba(184,148,46,0.20);

            --text-primary:  #0d1117;
            --text-muted:    #4b5563;
            --text-label:    #94a3b8;

            --shadow-sm:     0 2px 8px rgba(0,0,0,0.06);
            --shadow-md:     0 4px 20px rgba(0,0,0,0.07);
            --shadow-lg:     0 12px 36px rgba(0,0,0,0.10);

            --scrollbar:     rgba(184,148,46,0.3);

            --day-bg:        #f5f2eb;
            --day-border:    rgba(184,148,46,0.18);
            --day-hover-bdr: rgba(184,148,46,0.55);
            --today-shadow:  rgba(184,148,46,0.22);

            --calc-btn-bg:   #f5f2eb;
            --calc-btn-bdr:  rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --gold:          #d9b24c;
            --gold-light:    #f0d078;
            --gold-dim:      rgba(217,178,76,0.10);
            --gold-border:   rgba(217,178,76,0.26);

            --bg-base:       #060912;
            --bg-card:       rgba(255,255,255,0.045);
            --bg-card-hov:   rgba(255,255,255,0.07);
            --surface:       #0c1224;
            --surface-2:     #0f1628;
            --surface-3:     rgba(255,255,255,0.04);

            --sidebar-bg:    #0a0f1f;
            --sidebar-bdr:   rgba(217,178,76,0.22);

            --text-primary:  #f0ece4;
            --text-muted:    #9ca3af;
            --text-label:    #6b7280;

            --shadow-sm:     0 2px 8px rgba(0,0,0,0.2);
            --shadow-md:     0 8px 24px rgba(0,0,0,0.28);
            --shadow-lg:     0 16px 40px rgba(0,0,0,0.35);

            --scrollbar:     rgba(217,178,76,0.3);

            --day-bg:        rgba(255,255,255,0.05);
            --day-border:    rgba(217,178,76,0.20);
            --day-hover-bdr: rgba(217,178,76,0.55);
            --today-shadow:  rgba(217,178,76,0.25);

            --calc-btn-bg:   rgba(255,255,255,0.05);
            --calc-btn-bdr:  rgba(217,178,76,0.22);
        }

        /* ============================================================
           RESET & BASE
        ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Barlow', sans-serif;
            font-size: 15px;
            color: var(--text-primary);
            background: var(--bg-base);
            transition: background 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--text-primary);
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

        /* ============================================================
           LAYOUT
        ============================================================ */
        .app-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ============================================================
           SIDEBAR
        ============================================================ */
        .sidebar {
            width: 264px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-bdr);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            z-index: 130;
            transition: width 0.2s ease, background 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
        }

        .sidebar.mini { width: 72px; }

        /* Sidebar header */
        .sidebar-head {
            padding: 16px 14px 12px;
            border-bottom: 1px solid var(--gold-border);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .sidebar-brand-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--gold-dim);
            border: 1px solid var(--gold-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .sidebar-brand-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-primary);
            white-space: nowrap;
            transition: opacity 0.15s;
        }

        .sidebar-brand-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            color: var(--text-label);
            white-space: nowrap;
        }

        .sidebar.mini .sidebar-brand-text,
        .sidebar.mini .sidebar-brand-sub { opacity: 0; width: 0; overflow: hidden; }

        /* Toggle button */
        .sidebar-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1px solid var(--gold-border);
            border-radius: 10px;
            background: var(--gold-dim);
            color: var(--gold);
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .sidebar-toggle:hover { background: rgba(184,148,46,0.18); border-color: var(--gold); }
        .sidebar-toggle .t-label { white-space: nowrap; transition: opacity 0.15s; }
        .sidebar.mini .sidebar-toggle .t-label { opacity: 0; width: 0; overflow: hidden; }

        /* Nav menu */
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-group {
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            overflow: hidden;
            background: var(--surface);
        }

        .nav-main {
            width: 100%;
            border: none;
            background: transparent;
            padding: 11px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-primary);
            font-family: 'Barlow', sans-serif;
            font-weight: 600;
            font-size: 0.88rem;
            transition: background 0.15s;
            border-bottom: 1px solid transparent;
        }

        .nav-main:hover { background: var(--gold-dim); }

        .nav-main.has-sub { border-bottom-color: var(--gold-border); }

        .nav-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
        }

        .nav-chevron {
            margin-left: auto;
            color: var(--text-label);
            font-size: 0.75rem;
            transition: transform 0.2s;
        }

        .nav-main.sub-open .nav-chevron { transform: rotate(180deg); }

        .nav-sub {
            display: none;
            flex-direction: column;
        }

        .nav-sub.open { display: flex; }

        .nav-link {
            width: 100%;
            border: none;
            background: transparent;
            padding: 10px 12px 10px 20px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-muted);
            font-family: 'Barlow', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.15s;
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        [data-theme="dark"] .nav-link { border-top-color: rgba(255,255,255,0.04); }

        .nav-link:hover { background: var(--gold-dim); color: var(--gold); }
        .nav-link.active { background: rgba(184,148,46,0.15); color: var(--gold); }
        [data-theme="dark"] .nav-link.active { background: rgba(217,178,76,0.15); }

        .nav-icon {
            width: 16px; height: 16px;
            color: var(--gold);
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Mini mode — hide labels */
        .sidebar.mini .nav-main .n-label,
        .sidebar.mini .nav-main .nav-chevron,
        .sidebar.mini .nav-link .n-label,
        .sidebar.mini .exit-btn .n-label { opacity: 0; width: 0; overflow: hidden; white-space: nowrap; }

        .sidebar.mini .nav-link { padding-left: 12px; justify-content: center; }
        .sidebar.mini .nav-main { justify-content: center; }
        .sidebar.mini .nav-sub { display: none !important; }

        /* Sidebar footer */
        .sidebar-foot {
            padding: 12px 10px;
            border-top: 1px solid var(--gold-border);
        }

        .exit-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border: 1px solid var(--gold-border);
            border-radius: 10px;
            background: var(--gold-dim);
            color: var(--text-muted);
            font-family: 'Barlow', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            justify-content: center;
        }

        .exit-btn:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: #dc2626; }
        .exit-btn .nav-icon { color: inherit; }

        /* Mobile sidebar overlay */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 110;
        }

        .backdrop.show { display: block; }

        /* ============================================================
           MAIN CONTENT AREA
        ============================================================ */
        .main-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-base);
            transition: background 0.3s;
        }

        /* Topbar */
        .topbar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--sidebar-bdr);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            gap: 12px;
            transition: background 0.3s, border-color 0.3s;
        }

        .topbar-left { display: flex; align-items: center; gap: 12px; }

        .mobile-menu-btn {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border: 1px solid var(--gold-border);
            border-radius: 8px;
            background: var(--gold-dim);
            color: var(--gold);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-menu-btn:hover { background: rgba(184,148,46,0.18); }

        .topbar-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .topbar-right { display: flex; align-items: center; gap: 10px; }

        /* Breadcrumb chip */
        .topbar-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid var(--gold-border);
            background: var(--gold-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* Topbar buttons */
        .topbar-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--gold-border);
            background: var(--gold-dim);
            color: var(--gold);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .topbar-btn:hover { background: rgba(184,148,46,0.18); border-color: var(--gold); }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px; height: 34px;
            border-radius: 8px;
            border: 1px solid var(--gold-border);
            background: var(--gold-dim);
            color: var(--gold);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .theme-toggle:hover { background: rgba(184,148,46,0.2); border-color: var(--gold); transform: rotate(20deg); }

        /* ============================================================
           CONTENT SCROLL AREA
        ============================================================ */
        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ============================================================
           CARDS
        ============================================================ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--gold-border);
            border-radius: 14px;
            padding: 18px;
            box-shadow: var(--shadow-md);
            transition: background 0.3s, border-color 0.3s;
        }

        .card-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-label);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 3px; height: 12px;
            background: var(--gold);
            border-radius: 2px;
        }

        /* ============================================================
           DASHBOARD LAYOUT
        ============================================================ */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 14px;
        }

        .right-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ============================================================
           CALENDAR
        ============================================================ */
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .cal-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--gold-border);
            background: var(--gold-dim);
            color: var(--gold);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .cal-nav-btn:hover { background: rgba(184,148,46,0.18); border-color: var(--gold); }

        .cal-month {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .cal-selected {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem;
            color: var(--text-label);
            letter-spacing: 0.08em;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .cal-dow {
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-label);
            padding: 6px 0;
        }

        .cal-day {
            background: var(--day-bg);
            border: 1px solid var(--day-border);
            border-radius: 10px;
            min-height: 52px;
            padding: 7px 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            position: relative;
            transition: all 0.15s;
            color: var(--text-primary);
        }

        .cal-day:hover {
            border-color: var(--day-hover-bdr);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .cal-day.today {
            border-color: var(--gold);
            background: var(--gold-dim);
            box-shadow: 0 4px 14px var(--today-shadow);
        }

        .cal-day.today .day-num { color: var(--gold); }

        .cal-day.selected {
            outline: 2px solid var(--gold);
            outline-offset: 1px;
        }

        .day-note-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            align-self: flex-end;
        }

        /* ============================================================
           MINI CARDS (clock, calculator, notes)
        ============================================================ */
        .mini-card {
            background: var(--bg-card);
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            padding: 14px;
            box-shadow: var(--shadow-sm);
            transition: background 0.3s;
        }

        .mini-card-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-label);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Clock */
        .clock-display {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 2rem;
            font-weight: 400;
            color: var(--gold);
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .clock-date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-label);
            letter-spacing: 0.08em;
            margin-top: 4px;
        }

        /* Calculator */
        .calc-display {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gold-border);
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.1rem;
            font-weight: 500;
            background: var(--surface);
            color: var(--text-primary);
            text-align: right;
            outline: none;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .calc-grid button {
            padding: 9px 4px;
            border-radius: 8px;
            border: 1px solid var(--calc-btn-bdr);
            background: var(--calc-btn-bg);
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .calc-grid button:hover { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold); }

        .calc-op { color: var(--gold) !important; font-weight: 700 !important; }

        .calc-eq {
            background: var(--gold) !important;
            border-color: var(--gold) !important;
            color: #fff !important;
            font-weight: 700 !important;
        }

        [data-theme="dark"] .calc-eq { color: #0b0f1f !important; }

        .calc-eq:hover { opacity: 0.88; }

        /* Notes */
        .notes-input {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            border: 1px solid var(--gold-border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-primary);
            font-family: 'Barlow', sans-serif;
            font-size: 0.85rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 8px;
        }

        .notes-input:focus { border-color: var(--gold); }

        .note-save-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 14px;
            border-radius: 8px;
            border: none;
            background: var(--gold);
            color: #fff;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        [data-theme="dark"] .note-save-btn { color: #0b0f1f; }
        .note-save-btn:hover { background: var(--gold-light); }

        .note-list {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .note-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 8px;
            border: 1px solid var(--gold-border);
            background: var(--gold-dim);
        }

        .note-pill .view-note {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Barlow', sans-serif;
            font-size: 0.82rem;
            text-align: left;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ============================================================
           IFRAME PANEL
        ============================================================ -->
        */
        .frame-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .frame-panel.active { display: flex; }

        .frame-panel.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg-base);
            padding: 16px;
        }

        .frame-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .frame-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .frame-hint {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-label);
            letter-spacing: 0.08em;
        }

        iframe {
            width: 100%;
            height: 72vh;
            border: 1px solid var(--gold-border);
            border-radius: 12px;
            background: var(--surface);
            display: none;
        }

        .frame-panel.active iframe { display: block; }
        .frame-panel.fullscreen iframe { height: calc(100vh - 100px); }

        body.fullscreen-mode #dashboardSection { display: none; }

        /* Floating fullscreen exit button — only visible in fullscreen mode */
        .fs-exit-fab {
            display: none;
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 9999;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border-radius: 10px;
            border: 1px solid var(--gold-border);
            background: var(--sidebar-bg);
            color: var(--gold);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all 0.2s;
        }

        body.fullscreen-mode .fs-exit-fab {
            display: inline-flex;
            animation: fab-in 0.25s ease;
        }

        .fs-exit-fab:hover {
            background: var(--gold-dim);
            border-color: var(--gold);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }

        @keyframes fab-in {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ============================================================
           NOTE MODAL
        ============================================================ */
        .note-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 1000;
        }

        .note-modal-overlay.active { display: flex; }

        .note-modal-card {
            background: var(--bg-card);
            border: 1px solid var(--gold-border);
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            max-width: 420px;
            width: 100%;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background 0.3s;
        }

        .note-modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .note-modal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--gold);
        }

        .note-modal-date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem;
            color: var(--text-label);
        }

        .note-modal-close {
            background: none;
            border: none;
            color: var(--text-label);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .note-modal-close:hover { background: rgba(239,68,68,0.1); color: #dc2626; }

        .note-modal-textarea {
            width: 100%;
            min-height: 120px;
            padding: 10px;
            border: 1px solid var(--gold-border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-primary);
            font-family: 'Barlow', sans-serif;
            font-size: 0.88rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .note-modal-textarea:focus { border-color: var(--gold); }

        .note-modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 9px 16px;
            border-radius: 8px;
            border: 1px solid var(--gold-border);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn-default {
            background: var(--surface);
            color: var(--text-muted);
            border-color: var(--gold-border);
        }

        .modal-btn-default:hover { background: var(--surface-2); color: var(--text-primary); }

        .modal-btn-save {
            background: var(--gold);
            color: #fff;
            border: none;
        }

        [data-theme="dark"] .modal-btn-save { color: #0b0f1f; }
        .modal-btn-save:hover { background: var(--gold-light); }

        .modal-btn-delete {
            background: rgba(220,38,38,0.1);
            color: #dc2626;
            border-color: rgba(220,38,38,0.25);
        }

        .modal-btn-delete:hover { background: rgba(220,38,38,0.2); }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                top: 0; left: 0;
                height: 100%;
                transform: translateX(-110%);
                opacity: 0;
                pointer-events: none;
                z-index: 140;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
                opacity: 1;
                pointer-events: auto;
                box-shadow: 4px 0 30px rgba(0,0,0,0.25);
            }

            .mobile-menu-btn { display: inline-flex; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            .content-area { padding: 12px; }
            .cal-day { min-height: 44px; font-size: 0.75rem; }
            .calc-grid button { padding: 7px 2px; font-size: 0.78rem; }
            .topbar { padding: 0 12px; }
        }
    </style>
</head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<script>
    /* ============================================================
       THEME
    ============================================================ */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = document.getElementById('themeIcon');

    function applyTheme(t) {
        html.setAttribute('data-theme', t);
        localStorage.setItem('pulvion_theme', t);
        themeIcon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        themeToggle.title   = t === 'dark' ? 'Modo claro' : 'Modo escuro';
    }

    (function() { applyTheme(localStorage.getItem('pulvion_theme') || 'light'); })();
    themeToggle.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    /* ============================================================
       SIDEBAR TOGGLE
    ============================================================ */
    const sidebar      = document.getElementById('sidebar');
    const toggleBtn    = document.getElementById('toggleSidebar');
    const mobileBtn    = document.getElementById('mobileMenuBtn');
    const backdrop     = document.getElementById('backdrop');
    let isMobileOpen   = false;

    if (localStorage.getItem('sidebarMini') === '1') sidebar.classList.add('mini');
    if (window.innerWidth < 800) sidebar.classList.add('mini');

    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('mini');
        localStorage.setItem('sidebarMini', sidebar.classList.contains('mini') ? '1' : '0');
        refreshIcons();
    });

    function openMobileMenu() {
        isMobileOpen = true;
        sidebar.classList.add('mobile-open');
        backdrop.classList.add('show');
    }

    function closeMobileMenu() {
        isMobileOpen = false;
        sidebar.classList.remove('mobile-open');
        backdrop.classList.remove('show');
    }

    mobileBtn.addEventListener('click', () => isMobileOpen ? closeMobileMenu() : openMobileMenu());
    backdrop.addEventListener('click', closeMobileMenu);
    window.addEventListener('resize', () => { if (window.innerWidth > 900) closeMobileMenu(); });

    /* ============================================================
       NAV ACCORDION
    ============================================================ */
    document.querySelectorAll('.nav-main[data-group]').forEach(btn => {
        btn.addEventListener('click', () => {
            const group = btn.dataset.group;
            const sub   = document.querySelector(`.nav-sub[data-group="${group}"]`);
            if (sub) {
                sub.classList.toggle('open');
                btn.classList.toggle('sub-open', sub.classList.contains('open'));
            }
        });
    });

    /* ============================================================
       IFRAME PANEL
    ============================================================ */
    const dashSec      = document.getElementById('dashboardSection');
    const framePanel   = document.getElementById('framePanel');
    const frame        = document.getElementById('contentFrame');
    const frameTitle   = document.getElementById('frameTitle');
    const frameHint    = document.getElementById('frameHint');
    const btnFs        = document.getElementById('btnFullscreen');
    const fsIcon       = document.getElementById('fsIcon');
    const fsLabel      = document.getElementById('fsLabel');
    const topbarChip   = document.getElementById('topbarChip');
    const chipLabel    = document.getElementById('topbarChipLabel');
    let isFullscreen   = false;

    function setActiveLink(btn) {
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
    }

    document.querySelectorAll('.nav-link').forEach(btn => {
        btn.addEventListener('click', () => {
            const src   = btn.dataset.src;
            const label = btn.dataset.label || 'Conteúdo';
            frame.src       = src;
            frameTitle.textContent = label;
            frameHint.textContent  = src;
            framePanel.classList.add('active');
            dashSec.style.display  = 'none';
            btnFs.style.display    = 'inline-flex';
            topbarChip.style.display = 'inline-flex';
            chipLabel.textContent  = label;
            setActiveLink(btn);
            if (window.innerWidth <= 900) closeMobileMenu();
        });
    });

    document.querySelector('.nav-main[data-target="dashboard"]').addEventListener('click', () => {
        framePanel.classList.remove('active');
        dashSec.style.display    = 'block';
        btnFs.style.display      = 'none';
        topbarChip.style.display = 'none';
        frame.src = 'about:blank';
        setActiveLink(null);
        if (window.innerWidth <= 900) closeMobileMenu();
    });

    const fsExitFab = document.getElementById('fsExitFab');

    function setFullscreen(on) {
        isFullscreen = on;
        framePanel.classList.toggle('fullscreen', on);
        document.body.classList.toggle('fullscreen-mode', on);
        fsLabel.textContent = on ? 'Minimizar' : 'Tela inteira';
        fsIcon.setAttribute('data-lucide', on ? 'minimize-2' : 'maximize-2');
        refreshIcons();
    }

    btnFs.addEventListener('click', () => setFullscreen(!isFullscreen));
    fsExitFab.addEventListener('click', () => setFullscreen(false));

    // Escape key exits fullscreen
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && isFullscreen) setFullscreen(false);
    });

    /* ============================================================
       CALENDAR
    ============================================================ */
    const calGrid       = document.getElementById('calendarGrid');
    const monthLabel    = document.getElementById('monthLabel');
    const selectedLabel = document.getElementById('selectedLabel');
    const notesDtLabel  = document.getElementById('notesDateLabel');
    const noteInput     = document.getElementById('noteInput');
    const noteList      = document.getElementById('noteList');
    const STORAGE_KEY   = 'tg_admin_notes_v2';
    let currentDate     = new Date();
    let selectedDate    = new Date();
    let modalKey = null, modalIdx = null;

    const noteModal      = document.getElementById('noteModal');
    const noteModalText  = document.getElementById('noteModalText');
    const noteModalDate  = document.getElementById('noteModalDate');

    function fmtKey(d) { return d.toISOString().split('T')[0]; }
    function loadNotes() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(_){return{};} }
    function saveNotes(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

    function renderNotes() {
        const notes = loadNotes();
        const key   = fmtKey(selectedDate);
        const items = notes[key] || [];
        noteList.innerHTML = '';
        notesDtLabel.textContent = key;
        if (!items.length) {
            const e = document.createElement('div');
            e.style.cssText = 'color:var(--text-label);font-size:.8rem;font-family:IBM Plex Mono,monospace;';
            e.textContent = 'Sem anotações para esta data.';
            noteList.appendChild(e);
            return;
        }
        items.forEach((text, idx) => {
            const pill    = document.createElement('div');
            pill.className = 'note-pill';
            const btn = document.createElement('button');
            btn.className   = 'view-note';
            btn.textContent = text;
            btn.addEventListener('click', () => openNoteModal(key, idx, text));
            pill.appendChild(btn);
            noteList.appendChild(pill);
        });
        refreshIcons();
    }

    function buildCalendar() {
        calGrid.innerHTML = '';
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        const start = new Date(y, m, 1);
        const startDay = start.getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        monthLabel.textContent    = start.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
        selectedLabel.textContent = 'Selecionado: ' + fmtKey(selectedDate);

        ['D','S','T','Q','Q','S','S'].forEach(d => {
            const el = document.createElement('div');
            el.className = 'cal-dow';
            el.textContent = d;
            calGrid.appendChild(el);
        });

        for (let i = 0; i < startDay; i++) calGrid.appendChild(document.createElement('div'));

        const notes    = loadNotes();
        const todayKey = fmtKey(new Date());

        for (let d = 1; d <= daysInMonth; d++) {
            const cell = document.createElement('div');
            cell.className = 'cal-day';
            const date = new Date(y, m, d);
            const key  = fmtKey(date);

            const dayNum = document.createElement('span');
            dayNum.className = 'day-num';
            dayNum.textContent = d;
            cell.appendChild(dayNum);

            if (key === todayKey)          cell.classList.add('today');
            if (key === fmtKey(selectedDate)) cell.classList.add('selected');

            if (notes[key] && notes[key].length) {
                const dot = document.createElement('div');
                dot.className = 'day-note-dot';
                cell.appendChild(dot);
            }

            cell.addEventListener('click', () => {
                selectedDate = date;
                buildCalendar();
                renderNotes();
            });

            calGrid.appendChild(cell);
        }
    }

    function openNoteModal(key, idx, text) {
        modalKey = key; modalIdx = idx;
        noteModalText.value   = text;
        noteModalDate.textContent = key;
        noteModal.classList.add('active');
    }

    function closeNoteModal() {
        modalKey = null; modalIdx = null;
        noteModal.classList.remove('active');
    }

    function saveModalNote() {
        if (modalKey === null || modalIdx === null) return;
        const notes = loadNotes();
        const val   = noteModalText.value.trim();
        if (!val) { deleteModalNote(); return; }
        if (notes[modalKey]) {
            notes[modalKey][modalIdx] = val;
            saveNotes(notes); renderNotes(); buildCalendar();
        }
        closeNoteModal();
    }

    function deleteModalNote() {
        if (modalKey === null || modalIdx === null) return;
        const notes = loadNotes();
        if (!notes[modalKey]) return;
        notes[modalKey].splice(modalIdx, 1);
        if (!notes[modalKey].length) delete notes[modalKey];
        saveNotes(notes); renderNotes(); buildCalendar();
        closeNoteModal();
    }

    document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); buildCalendar(); });
    document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); buildCalendar(); });

    document.getElementById('saveNote').addEventListener('click', () => {
        const text = noteInput.value.trim();
        if (!text) return;
        const notes = loadNotes();
        const key   = fmtKey(selectedDate);
        notes[key]  = notes[key] || [];
        notes[key].push(text);
        saveNotes(notes);
        noteInput.value = '';
        renderNotes(); buildCalendar();
    });

    document.getElementById('closeModal').addEventListener('click', closeNoteModal);
    document.getElementById('cancelModal').addEventListener('click', closeNoteModal);
    document.getElementById('saveModal').addEventListener('click', saveModalNote);
    document.getElementById('deleteModal').addEventListener('click', deleteModalNote);
    noteModal.addEventListener('click', e => { if (e.target === noteModal) closeNoteModal(); });

    /* ============================================================
       CLOCK
    ============================================================ */
    const clockEl   = document.getElementById('clockNow');
    const clockDate = document.getElementById('clockDate');

    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        const s = String(now.getSeconds()).padStart(2,'0');
        clockEl.textContent   = `${h}:${m}:${s}`;
        clockDate.textContent = now.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
    }

    setInterval(updateClock, 1000);
    updateClock();

    /* ============================================================
       CALCULATOR
    ============================================================ */
    const calcDisp = document.getElementById('calcDisplay');

    function appendVal(v) { calcDisp.value = (calcDisp.value === '0' ? '' : calcDisp.value) + v; }
    function clearCalc()  { calcDisp.value = '0'; }
    function delCalc()    { calcDisp.value = calcDisp.value.length > 1 ? calcDisp.value.slice(0,-1) : '0'; }
    function evalCalc()   {
        const expr = calcDisp.value.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
        if (!/^[0-9+\-*/().\s]+$/.test(expr)) { calcDisp.value='0'; return; }
        try { const r = Function('return ' + expr)(); calcDisp.value = isFinite(r) ? String(r) : '0'; }
        catch(_){ calcDisp.value = '0'; }
    }

    document.querySelectorAll('.calc-grid button[data-val]').forEach(b => b.addEventListener('click', () => appendVal(b.dataset.val)));
    document.getElementById('calcClear').addEventListener('click', clearCalc);
    document.getElementById('calcDel').addEventListener('click', delCalc);
    document.getElementById('calcEq').addEventListener('click', evalCalc);

    /* ============================================================
       LUCIDE ICONS
    ============================================================ */
    function refreshIcons() { if (window.lucide) lucide.createIcons(); }

    /* ============================================================
       INIT
    ============================================================ */
    buildCalendar();
    renderNotes();
    refreshIcons();
</script>
</body>
</html>
